<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Team Trivia Run</title>
  <script src="https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f23;
      --track: #1a1a2e;
      --runway: #252540;
      --primary: #00d4ff;
      --success: #00ff88;
      --warning: #ffd700;
      --error: #ff4757;
      --text: #ffffff;
      --text-muted: #8892b0;
      --team1: #ff6b6b;
      --team2: #4ecdc4;
      --team3: #ffe66d;
      --team4: #95e1d3;
      --team5: #f38181;
      --team6: #aa96da;
      --team7: #fcbad3;
      --team8: #a8d8ea;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--track);
      border-bottom: 1px solid rgba(0,212,255,0.2);
    }

    .logo { font-size: 1.25rem; font-weight: 700; color: var(--primary); }

    .status { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; }

    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--error);
    }
    .status-dot.connected { background: var(--success); animation: pulse 2s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .page { display: none; flex:1; }
    .page.active { display: flex; flex-direction: column; }

    h1 { font-size: 1.5rem; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; color: var(--text-muted); font-size: 0.875rem; }

    .btn {
      padding: 14px 20px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 52px;
    }
    .btn:hover { transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: var(--bg); }
    .btn-secondary { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-small { padding: 8px 12px; font-size: 0.875rem; min-height: 36px; }

    .input-group { margin-bottom: 12px; }
    label { display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 4px; }
    
    input {
      width: 100%;
      padding: 14px;
      font-family: inherit;
      font-size: 1rem;
      background: var(--track);
      border: 2px solid rgba(0,212,255,0.3);
      border-radius: 8px;
      color: var(--text);
      outline: none;
    }
    input:focus { border-color: var(--primary); }

    .card {
      background: var(--track);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    /* HOST CONSOLE LAYOUT */
    .host-console {
      display: none;
      flex: 1;
      flex-direction: row;
      overflow: hidden;
    }
    .host-console.active { display: flex; }

    .left-panel {
      width: 280px;
      background: var(--track);
      border-right: 1px solid rgba(0,212,255,0.2);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .host-info-toggle {
      padding: 8px 12px;
      background: var(--runway);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .host-info-toggle:hover { background: rgba(0,212,255,0.1); }

    .host-info-box {
      display: none;
      padding: 16px;
      border-bottom: 1px solid rgba(0,212,255,0.2);
    }
    .host-info-box.show { display: block; }

    #qrContainer { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    #qrCode { background: white; padding: 8px; border-radius: 8px; }
    .room-code-display { font-size: 2rem; font-weight: 700; letter-spacing: 4px; color: var(--primary); }

    .team-list { flex: 1; overflow-y: auto; padding: 12px; }

    .team-item {
      background: var(--runway);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      border-left: 4px solid var(--primary);
    }
    .team-item.filled { opacity: 1; }
    .team-item.empty { border-left: 4px dashed var(--text-muted); opacity: 0.6; }

    .team-item-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
    .team-item-players { font-size: 0.7rem; color: var(--text-muted); }

    .team-count-bar {
      padding: 12px;
      background: var(--runway);
      border-top: 1px solid rgba(0,212,255,0.2);
      text-align: center;
      font-size: 0.875rem;
    }

    .playground {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .runway {
      background: var(--runway);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 64px;
      position: relative;
      overflow: hidden;
    }

    .runway-team {
      font-size: 0.875rem;
      font-weight: 700;
      width: 90px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .runway-track {
      flex: 1;
      height: 36px;
      background: var(--bg);
      border-radius: 4px;
      position: relative;
    }

    .runway-steps {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
    }

    .step-marker {
      flex: 1;
      border-right: 1px solid var(--runway);
    }

    .runway-runner {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.5rem;
      transition: left 0.5s ease;
    }

    .finish-line {
      position: absolute;
      right: 50px;
      top: 0;
      bottom: 0;
      width: 4px;
      background: repeating-linear-gradient(0deg, var(--warning) 0px, var(--warning) 8px, var(--bg) 8px, var(--bg) 16px);
    }

    .runway-info {
      width: 80px;
      text-align: right;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .question-area {
      padding: 16px;
      background: var(--track);
      border-top: 1px solid rgba(0,212,255,0.2);
    }

    .question-display {
      background: var(--runway);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
    }

    .question-text { font-size: 1.5rem; line-height: 1.4; }

    .timer-display {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      padding: 12px;
      color: var(--primary);
    }
    .timer-display.warning { color: var(--warning); }
    .timer-display.danger { color: var(--error); }

    /* PLAYER VIEW */
    .player-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .result-msg {
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .result-msg.correct { background: rgba(0,255,136,0.2); color: var(--success); }
    .result-msg.wrong { background: rgba(255,71,87,0.2); color: var(--error); }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .answer-btn {
      padding: 20px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      background: var(--track);
      border: 2px solid rgba(0,212,255,0.3);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .answer-btn:hover { border-color: var(--primary); }
    .answer-btn.selected { background: rgba(0,212,255,0.3); border-color: var(--primary); }
    .answer-btn.correct { background: rgba(0,255,136,0.3); border-color: var(--success); }
    .answer-btn.incorrect { background: rgba(255,71,87,0.3); border-color: var(--error); }
    .answer-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .answer-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: var(--bg);
      font-weight: 700;
    }

    .correct-answer {
      background: rgba(0,255,136,0.2);
      border: 2px solid var(--success);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 12px;
    }

    .waiting-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid var(--track);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--track);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
    }

    .button-group { display: flex; flex-direction: column; gap: 10px; }
    .big-btn { width: 100%; padding: 20px; font-size: 1.25rem; }

    .error-msg {
      background: rgba(255,71,87,0.2);
      color: var(--error);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .host-console { flex-direction: column; }
      .left-panel { width: 100%; max-height: 200px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">TEAM TRIVIA RUN</div>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Offline</span>
      </div>
    </header>

    <main>
      <div class="page active" id="startPage">
        <div class="player-main">
          <h1>TEAM TRIVIA RUN</h1>
          <p class="subtitle">Race to 100 by answering trivia!</p>
          <div class="button-group" style="margin-top: 20px;">
            <button class="btn btn-primary big-btn" onclick="hostGame()">Host Game (Show Console)</button>
            <button class="btn btn-secondary big-btn" onclick="showJoin()">Join as Player</button>
          </div>
        </div>
      </div>

      <div class="page" id="joinPage">
        <div class="player-main">
          <h1>JOIN TEAM</h1>
          <div class="input-group">
            <label>Team Name</label>
            <input type="text" id="teamName" placeholder="e.g., Tigers" maxlength="15">
          </div>
          <div class="input-group">
            <label>Player 1 (iPad 1)</label>
            <input type="text" id="player1Name" placeholder="Player name" maxlength="15">
          </div>
          <div class="input-group">
            <label>Player 2 (iPad 2)</label>
            <input type="text" id="player2Name" placeholder="Teammate name" maxlength="15">
          </div>
          <div class="input-group">
            <label>Room Code</label>
            <input type="text" id="roomCode" placeholder="ABCD" maxlength="4" style="text-transform:uppercase;letter-spacing:4px;text-align:center;">
          </div>
          <div class="button-group">
            <button class="btn btn-primary big-btn" onclick="joinTeam()">Join</button>
            <button class="btn btn-secondary" onclick="showStart()">Back</button>
          </div>
        </div>
      </div>

      <div class="page" id="hostPage">
        <div class="host-console active">
          <div class="left-panel">
            <div class="host-info-toggle" onclick="toggleHostInfo()">
              <span>🎮 Host Controls</span>
              <span id="toggleIcon">▼</span>
            </div>
            <div class="host-info-box" id="hostInfoBox">
              <div id="qrContainer">
                <canvas id="qrCode"></canvas>
                <div class="room-code-display" id="displayRoomCode"></div>
              </div>
              <p style="font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:8px;">Teams scan QR to join</p>
              <div style="display:flex;gap:8px;margin-top:12px;">
                <button class="btn btn-primary btn-small" style="flex:1" id="startGameBtn" onclick="startGame()" disabled>Start</button>
                <button class="btn btn-secondary btn-small" style="flex:1" onclick="resetGame()">Reset</button>
              </div>
            </div>
            <div class="team-list" id="teamList"></div>
            <div class="team-count-bar" id="teamCountBar">0/8 Teams</div>
          </div>
          
          <div class="right-panel">
            <div class="playground" id="playground"></div>
            <div class="question-area">
              <div class="question-display">
                <p class="question-text" id="questionText">Waiting for host to start...</p>
              </div>
              <div class="timer-display" id="timerDisplay" style="display:none;">12</div>
            </div>
          </div>
        </div>
      </div>

      <div class="page" id="playerPage">
        <div class="player-main">
          <div class="result-msg" id="resultMsg" style="display:none;"></div>
          <div class="question-display">
            <p class="question-text" id="playerQuestionText">Waiting...</p>
          </div>
          <div class="correct-answer" id="correctAnswer" style="display:none;">
            Correct: <span id="correctAnswerText"></span>
          </div>
          <div class="answers" id="playerAnswers"></div>
        </div>
        <div class="footer-player">
          <span>Team: <span id="myTeamName">-</span></span>
          <span>Step <span id="myStep">0</span>/100</span>
        </div>
      </div>

      <div class="page" id="waitingPage">
        <div class="waiting-screen">
          <div class="spinner"></div>
          <p class="subtitle">Waiting for next question...</p>
        </div>
      </div>

      <div class="page" id="winnerPage">
        <div class="player-main">
          <div style="text-align:center;padding:40px;">
            <div style="font-size:4rem;">🏆</div>
            <h1 id="winnerTeam" style="margin-top:20px;">Team Wins!</h1>
            <p class="subtitle" id="finalScore"></p>
          </div>
          <button class="btn btn-primary big-btn" onclick="showStart()">New Game</button>
        </div>
      </div>

      <div class="page" id="errorPage">
        <div class="player-main">
          <div class="error-msg" id="errorMsg"></div>
          <button class="btn btn-primary" onclick="showStart()">Back</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const QUESTIONS = [
      { q: "What planet is the Red Planet?", a: ["Mars", "Venus", "Jupiter", "Saturn"], c: 0 },
      { q: "What is the largest ocean?", a: ["Pacific", "Atlantic", "Indian", "Arctic"], c: 0 },
      { q: "Who painted Mona Lisa?", a: ["Da Vinci", "Michelangelo", "Raphael", "Donatello"], c: 0 },
      { q: "Chemical symbol for gold?", a: ["Au", "Ag", "Go", "Gd"], c: 0 },
      { q: "How many continents?", a: ["7", "5", "6", "8"], c: 0 },
      { q: "Capital of France?", a: ["Paris", "London", "Berlin", "Madrid"], c: 0 },
      { q: "Plants absorb what gas?", a: ["CO2", "Oxygen", "Nitrogen", "Hydrogen"], c: 0 },
      { q: "Who wrote Hamlet?", a: ["Shakespeare", "Hemingway", "Austen", "Dickens"], c: 0 },
      { q: "Hardest natural substance?", a: ["Diamond", "Iron", "Titanium", "Quartz"], c: 0 },
      { q: "WWII ended in?", a: ["1945", "1944", "1946", "1943"], c: 0 },
      { q: "Smallest prime?", a: ["2", "1", "3", "0"], c: 0 },
      { q: "Most populous country?", a: ["India", "China", "USA", "Indonesia"], c: 0 },
      { q: "Largest mammal?", a: ["Blue Whale", "Elephant", "Giraffe", "Hippo"], c: 0 },
      { q: "Sides on hexagon?", a: ["6", "5", "7", "8"], c: 0 },
      { q: "Fastest land animal?", a: ["Cheetah", "Lion", "Horse", "Gazelle"], c: 0 },
      { q: "Atomic number 1?", a: ["Hydrogen", "Helium", "Oxygen", "Carbon"], c: 0 },
      { q: "Discovered penicillin?", a: ["Fleming", "Curie", "Newton", "Einstein"], c: 0 },
      { q: "Longest river?", a: ["Nile", "Amazon", "Mississippi", "Yangtze"], c: 0 },
      { q: "Bones in adult body?", a: ["206", "208", "200", "210"], c: 0 },
      { q: "Capital of Japan?", a: ["Tokyo", "Kyoto", "Osaka", "Seoul"], c: 0 },
      { q: "First on moon?", a: ["Armstrong", "Aldrin", "Gagarin", "Glenn"], c: 0 },
      { q: "Largest desert?", a: ["Sahara", "Arabian", "Gobi", "Kalahari"], c: 0 },
      { q: "Guacamole main?", a: ["Avocado", "Tomato", "Lime", "Onion"], c: 0 },
      { q: "Guitar strings?", a: ["6", "4", "5", "7"], c: 0 },
      { q: "Degrees in triangle?", a: ["180", "90", "360", "270"], c: 0 },
      { q: "Capital Australia?", a: ["Canberra", "Sydney", "Melbourne", "Perth"], c: 0 },
      { q: "Largest US state?", a: ["Alaska", "Texas", "California", "Montana"], c: 0 },
      { q: "Light speed (M m/s)?", a: ["300", "150", "500", "200"], c: 0 },
      { q: "Water boiling (°C)?", a: ["100", "90", "110", "80"], c: 0 },
      { q: "Closest star?", a: ["Sun", "Proxima", "Alpha Cen", "Sirius"], c: 0 }
    ];

    const TEAM_COLORS = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da', '#fcbad3', '#a8d8ea'];
    const RUNNER_EMOJI = '🏃';
    const STEPS_TO_WIN = 100;
    const QUESTION_TIME = 12;

    let client = null;
    let gameId = null;
    let playerId = null;
    let teamId = null;
    let isHost = false;
    let currentQuestion = null;
    let answered = false;
    let myTeamStep = 0;
    let teams = {};
    let gameActive = false;
    let questionTimer = null;

    const BROKER_URL = "wss://broker.hivemq.com:8884/mqtt";

    function generateId(len = 4) {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      return Array.from({length: len}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    }

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showStart() { showPage('startPage'); }
    function showJoin() { showPage('joinPage'); }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (connected) { dot.classList.add('connected'); text.textContent = 'Live'; }
      else { dot.classList.remove('connected'); text.textContent = 'Offline'; }
    }

    function connectMQTT(callback) {
      client = mqtt.connect(BROKER_URL, {
        clientId: "triviarun_" + generateId(8),
        clean: true,
        reconnectPeriod: 3000
      });
      client.on('connect', () => { updateStatus(true); callback(); });
      client.on('error', () => { updateStatus(false); });
      client.on('offline', () => { updateStatus(false); });
      client.on('reconnect', () => { updateStatus(true); });
    }

    function publish(topic, payload) {
      if (client && client.connected) {
        client.publish(topic, JSON.stringify(payload), { qos: 1, retain: false });
      }
    }

    function hostGame() {
      isHost = true;
      gameId = generateId(4);
      teams = {};
      playerId = 'host_' + generateId(6);
      teamId = null;

      connectMQTT(() => {
        client.subscribe(gameId + '/#', (err) => {
          if (err) { showError('Failed to create game'); return; }
          
          showHostConsole();
        });
      });
    }

    function toggleHostInfo() {
      const box = document.getElementById('hostInfoBox');
      const icon = document.getElementById('toggleIcon');
      box.classList.toggle('show');
      icon.textContent = box.classList.contains('show') ? '▲' : '▼';
    }

    function showHostConsole() {
      document.getElementById('displayRoomCode').textContent = gameId;
      const url = window.location.href.split('?')[0] + '?room=' + gameId;
      QRCode.toCanvas(document.getElementById('qrCode'), url, { width: 120, margin: 0 }, (err) => {});
      
      updateTeamList();
      updateRunways();
      showPage('hostPage');
      
      client.on('message', (topic, msg) => {
        try {
          const data = JSON.parse(msg.toString());
          const t = topic.split('/')[1];
          
          if (t === 'teams' && data.type === 'join') {
            if (Object.keys(teams).length < 8 && !teams[data.teamId]) {
              teams[data.teamId] = {
                id: data.teamId,
                name: data.teamName,
                player1: data.player1,
                player2: data.player2,
                step: 0,
                color: TEAM_COLORS[Object.keys(teams).length % 8]
              };
              publish(gameId + '/teams', { type: 'update', teams: teams });
              updateTeamList();
              updateRunways();
            }
          } else if (t === 'answer') {
            handleTeamAnswer(data.teamId, data.answer, data.playerId);
          } else if (t === 'progress') {
            teams = data.teams;
            updateRunways();
            checkWinner();
          }
        } catch (e) {}
      });
    }

    function updateTeamList() {
      const list = document.getElementById('teamList');
      let html = '';
      for (let i = 0; i < 8; i++) {
        const teamKeys = Object.keys(teams);
        const team = teams[teamKeys[i]];
        if (team) {
          html += `<div class="team-item filled" style="border-left-color:${team.color}">
            <div class="team-item-name" style="color:${team.color}">${team.name}</div>
            <div class="team-item-players">📱 ${team.player1}${team.player2 ? ' + ' + team.player2 : ''}</div>
          </div>`;
        } else {
          html += `<div class="team-item empty">Waiting...</div>`;
        }
      }
      list.innerHTML = html;
      document.getElementById('teamCountBar').textContent = `${Object.keys(teams).length}/8 Teams`;
      document.getElementById('startGameBtn').disabled = Object.keys(teams).length === 0;
    }

    function startGame() {
      if (Object.keys(teams).length === 0) return;
      gameActive = true;
      showPage('hostPage');
      nextQuestion();
    }

    function nextQuestion() {
      if (!gameActive) return;
      const q = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
      currentQuestion = q;
      
      document.getElementById('questionText').textContent = q.q;
      const timerEl = document.getElementById('timerDisplay');
      timerEl.style.display = 'block';
      timerEl.textContent = QUESTION_TIME;
      timerEl.className = 'timer-display';
      
      publish(gameId + '/question', { question: q, time: QUESTION_TIME });
      
      let timeLeft = QUESTION_TIME;
      questionTimer = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 3) timerEl.className = 'timer-display danger';
        else if (timeLeft <= 5) timerEl.className = 'timer-display warning';
        
        if (timeLeft <= 0) {
          clearInterval(questionTimer);
          timerEl.style.display = 'none';
          showAnswer();
        }
      }, 1000);
    }

    function handleTeamAnswer(teamId, answer, playerId) {
      if (!currentQuestion) return;
      const correct = answer === currentQuestion.c;
      const steps = correct ? Math.floor(Math.random() * 5) + 1 : 0;
      
      if (teams[teamId]) {
        teams[teamId].step = Math.min(teams[teamId].step + steps, STEPS_TO_WIN);
        
        publish(gameId + '/progress', { 
          teams: teams, 
          lastTeam: teamId, 
          steps: steps,
          correct: correct,
          showAnswer: true
        });
      }
    }

    function showAnswer() {
      if (!currentQuestion) return;
      if (questionTimer) clearInterval(questionTimer);
      document.getElementById('timerDisplay').style.display = 'none';
      
      publish(gameId + '/question', { 
        question: currentQuestion, 
        time: 0,
        showAnswer: true 
      });
      
      setTimeout(() => {
        if (gameActive) nextQuestion();
      }, 3000);
    }

    function updateRunways() {
      const container = document.getElementById('playground');
      const sorted = Object.values(teams).sort((a, b) => b.step - a.step);
      
      container.innerHTML = sorted.map(team => {
        const pct = (team.step / STEPS_TO_WIN) * 100;
        return `<div class="runway" style="border-left:4px solid ${team.color}">
          <div class="runway-team" style="color:${team.color}">${team.name}</div>
          <div class="runway-track">
            ${Array.from({length: 100}, () => '<div class="step-marker"></div>').join('')}
            <div class="finish-line"></div>
            <div class="runway-runner" style="left:calc(${pct}% - 20px)">${RUNNER_EMOJI}</div>
          </div>
          <div class="runway-info">${team.step}/100</div>
        </div>`;
      }).join('') || '<p style="text-align:center;color:var(--text-muted)">Waiting for teams...</p>';
    }

    function checkWinner() {
      const winner = Object.values(teams).find(t => t.step >= STEPS_TO_WIN);
      if (winner) {
        gameActive = false;
        if (questionTimer) clearInterval(questionTimer);
        document.getElementById('winnerTeam').textContent = `${winner.name} Wins!`;
        document.getElementById('finalScore').textContent = `Reached 100 steps first!`;
        publish(gameId + '/winner', { winner: winner.name });
        showPage('winnerPage');
      }
    }

    function resetGame() {
      teams = {};
      gameActive = false;
      if (questionTimer) clearInterval(questionTimer);
      publish(gameId + '/teams', { type: 'update', teams: teams });
      updateTeamList();
      updateRunways();
      document.getElementById('questionText').textContent = 'Waiting for host to start...';
      document.getElementById('timerDisplay').style.display = 'none';
    }

    // PLAYER FUNCTIONS
    function joinTeam() {
      const teamName = document.getElementById('teamName').value.trim();
      const p1 = document.getElementById('player1Name').value.trim();
      const p2 = document.getElementById('player2Name').value.trim();
      const code = document.getElementById('roomCode').value.trim().toUpperCase();

      if (!teamName || !p1 || !code || code.length !== 4) {
        alert('Please fill all required fields');
        return;
      }

      gameId = code;
      playerId = generateId(6);
      teamId = 'team_' + generateId(4);

      connectMQTT(() => {
        const topic = gameId + '/player/' + playerId;
        client.subscribe(topic, (err) => {
          if (err) { showError('Failed to join - check code'); return; }
          
          publish(gameId + '/teams', {
            type: 'join',
            teamId: teamId,
            teamName: teamName,
            player1: p1,
            player2: p2
          });
          
          showPlayerGame();
        });
      });

      client.on('message', (topic, msg) => {
        try {
          const data = JSON.parse(msg.toString());
          
          if (topic.includes(playerId)) {
            if (data.teams) {
              const myTeam = Object.values(data.teams).find(t => t.id === teamId);
              if (myTeam) {
                myTeamStep = myTeam.step;
                document.getElementById('myStep').textContent = myTeamStep;
                document.getElementById('myTeamName').textContent = myTeam.name;
              }
            }
            
            if (data.question) {
              answered = false;
              currentQuestion = data.question;
              document.getElementById('playerQuestionText').textContent = data.question.q;
              document.getElementById('resultMsg').style.display = 'none';
              document.getElementById('correctAnswer').style.display = 'none';
              
              const letters = ['A', 'B', 'C', 'D'];
              document.getElementById('playerAnswers').innerHTML = data.question.a.map((ans, i) => `
                <button class="answer-btn" onclick="submitAnswer(${i})" id="ans${i}">
                  <span class="answer-letter">${letters[i]}</span>
                  ${ans}
                </button>
              `).join('');
              
              if (data.showAnswer) {
                showPlayerAnswer();
              } else {
                showPage('playerPage');
              }
            }
            
            if (data.winner) {
              gameActive = false;
              document.getElementById('winnerTeam').textContent = `${data.winner} Wins!`;
              showPage('winnerPage');
            }
          }
        } catch (e) {}
      });
    }

    function showPlayerGame() {
      showPage('waitingPage');
    }

    function submitAnswer(index) {
      if (answered || !currentQuestion) return;
      answered = true;
      
      document.querySelectorAll('.answer-btn').forEach(btn => btn.disabled = true);
      document.getElementById('ans' + index).classList.add('selected');
      
      publish(gameId + '/answer', {
        teamId: teamId,
        answer: index,
        playerId: playerId
      });
      
      showPage('waitingPage');
    }

    function showPlayerAnswer() {
      const correct = currentQuestion.c;
      
      document.querySelectorAll('.answer-btn').forEach((btn, i) => {
        if (i === correct) btn.classList.add('correct');
      });
      
      const selected = document.querySelector('.answer-btn.selected');
      if (selected && !selected.classList.contains('correct')) {
        selected.classList.add('incorrect');
      }
      
      const isCorrect = selected && selected.classList.contains('correct');
      const resultMsg = document.getElementById('resultMsg');
      resultMsg.textContent = isCorrect ? `+${Math.floor(Math.random() * 5) + 1} Steps!` : 'Try again!';
      resultMsg.className = 'result-msg ' + (isCorrect ? 'correct' : 'wrong');
      resultMsg.style.display = 'block';
      
      document.getElementById('correctAnswerText').textContent = currentQuestion.a[correct];
      document.getElementById('correctAnswer').style.display = 'block';
      
      showPage('playerPage');
      
      // Update step from teams
      if (teams[teamId]) {
        myTeamStep = teams[teamId].step;
        document.getElementById('myStep').textContent = myTeamStep;
      }
    }

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      showPage('errorPage');
    }

    // Check URL for room code
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const room = params.get('room');
      if (room) {
        document.getElementById('roomCode').value = room.toUpperCase();
        showJoin();
      }
    }
  </script>
</body>
</html>
